name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on hook scripts
        run: |
          find examples/hooks -name 'hook' -type f | while read -r f; do
            echo "Checking $f"
            (cd "$(dirname "$f")" && shellcheck -x "$(basename "$f")")
          done
